# Workspace Cargo config for siderust.
#
# `SIDERUST_JPL_STUB=all` is set in CI for deterministic `--all-features` jobs.
# It is a no-op for current releases (JPL kernels are runtime-only via BSP files).
#
# For runtime dataset caching when using `runtime-data`:
# SIDERUST_DATASETS_DIR=$PWD/.datasets cargo test --features runtime-data

[env]
SIDERUST_JPL_STUB = "all"
SIDERUST_DATASETS_DIR = { value = ".datasets", relative = true }
