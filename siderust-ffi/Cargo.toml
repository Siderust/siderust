[package]
name = "siderust-ffi"
version = "0.3.0"
edition = "2021"
authors = ["VPRamon <vallespuigramon@gmail.com>"]
description = "C FFI bindings for siderust, high-precision astronomy library."
license = "AGPL-3.0-only"
repository = "https://github.com/Siderust/siderust"

[lib]
name = "siderust_ffi"
crate-type = ["cdylib", "staticlib", "rlib"]

[features]
default = []
serde = ["siderust/serde", "tempoch-ffi/serde"]
de440 = ["siderust/de440"]
runtime-data = ["siderust/runtime-data"]

[dependencies]
siderust    = { version = "0.6.0", path = ".." }
qtty        = { version = "0.4.1", path = "../../qtty/qtty" }
tempoch     = { version = "0.4.0", path = "../../tempoch/tempoch" }
tempoch-ffi = { version = "0.3.0", path = "../../tempoch/tempoch-ffi" }
affn        = { version = "0.5.0", path = "../../affn", features = ["astro"] }

[build-dependencies]
cbindgen = "0.29.2"
