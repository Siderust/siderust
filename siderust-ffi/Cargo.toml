[package]
name = "siderust-ffi"
version = "0.4.1"
edition = "2021"
authors = ["VPRamon <vallespuigramon@gmail.com>"]
description = "C FFI bindings for siderust, high-precision astronomy library."
license = "AGPL-3.0-only"
repository = "https://github.com/Siderust/siderust"

[lib]
name = "siderust_ffi"
crate-type = ["cdylib", "staticlib", "rlib"]

[features]
default = []
serde = ["siderust/serde"]
de440 = ["siderust/de440"]
de441 = ["siderust/de441"]
runtime-data = ["siderust/runtime-data"]

[dependencies]
siderust    = { version = "0.6.1", path = ".." }
qtty        = "0.6.1"
tempoch     = "0.4.2"
tempoch-ffi = "0.4.2"
affn        = { version = "0.6.1", features = ["astro"] }

[build-dependencies]
cbindgen = "0.29.2"
