[package]
name = "siderust-ffi"
version = "0.1.0"
edition = "2021"
authors = ["VPRamon <vallespuigramon@gmail.com>"]
description = "C FFI bindings for siderust — high-precision astronomy library."
license = "AGPL-3.0-only"
repository = "https://github.com/Siderust/siderust"

[lib]
name = "siderust_ffi"
crate-type = ["cdylib", "staticlib", "rlib"]

[features]
default = []
serde = ["siderust/serde", "tempoch-ffi/serde"]
de440 = ["siderust/de440"]
runtime-data = ["siderust/runtime-data"]

[dependencies]
siderust    = { version = "0.6.0", path = "..", features = [] }
qtty        = "0.4.0"
qtty-ffi    = "0.4.0"
tempoch     = "0.4"
tempoch-ffi = "0.2.0"
affn        = { version = "0.4.1", features = ["astro"] }

[build-dependencies]
cbindgen = "0.29.2"
